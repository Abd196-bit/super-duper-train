<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Pokemon Leaf Green</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; align-items: center; justify-content: center; }
        #game { width: 100%; height: 100%; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: sans-serif; font-size: 20px; z-index: 200; }
        #legend { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 4px; font-family: sans-serif; font-size: 12px; color: #fff; z-index: 100; }
        kbd { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="game"></div>
    <div id="legend"><kbd>↑↓←→</kbd> Move <kbd>Z</kbd> A <kbd>X</kbd> B <kbd>Enter</kbd> Start <kbd>Shift</kbd> Select</div>

    <script>
        window.EJS_player = '#game';
        window.EJS_gameUrl = 'Pokemon - Leaf Green Version (U) (V1.1).gba';
        window.EJS_core = 'gba';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameName = 'Pokemon Leaf Green';
        window.EJS_startOnLoaded = true;
        window.EJS_OnGameLoaded = () => { document.getElementById('loading').style.display = 'none'; };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
