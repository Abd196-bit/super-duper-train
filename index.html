<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Pokemon Leaf Green</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #canvas {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: pixelated;
            background: #000;
        }
        #controls-legend {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
            z-index: 100;
        }
        #controls-legend kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 24px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <canvas id="canvas" width="240" height="160"></canvas>
    <div id="controls-legend">
        <kbd>↑↓←→</kbd> D-Pad 
        <kbd>Z</kbd> A 
        <kbd>X</kbd> B 
        <kbd>Enter</kbd> Start 
        <kbd>Shift</kbd> Select
    </div>

    <script type="module">
        import mGBA from "https://cdn.jsdelivr.net/npm/mgba@0.3.0/dist/mgba.js";
        
        const canvas = document.getElementById('canvas');
        const loading = document.getElementById('loading');
        
        let emulator = null;
        
        // Load and auto-start ROM
        async function loadAndStartROM() {
            try {
                const response = await fetch('Pokemon - Leaf Green Version (U) (V1.1).gba');
                if (!response.ok) throw new Error('ROM not found');
                
                const romData = await response.arrayBuffer();
                const romPath = '/game.gba';
                emulator.FS.writeFile(romPath, new Uint8Array(romData));
                emulator.loadGame(romPath);
                
                // Auto-start the game
                emulator.setMainLoopTiming(1, 60);
                emulator.resumeGame();
                
                loading.style.display = 'none';
            } catch (e) {
                console.error('Failed to load ROM:', e);
                loading.textContent = 'Error loading ROM';
            }
        }
        
        // Initialize emulator
        async function initEmulator() {
            emulator = await mGBA(module => ({
                canvas,
                print: console.log,
                printErr: console.error,
            }));
            await loadAndStartROM();
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (emulator) emulator.keyDown(e.keyCode);
        });
        
        document.addEventListener('keyup', (e) => {
            if (emulator) emulator.keyUp(e.keyCode);
        });
        
        // Initialize
        initEmulator();
    </script>
</body>
</html>
